<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ghlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dd6b20;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f7fafc"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="70" fill="url(#headerGrad)"/>
  <text x="600" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">SHB Studio Warranty System — Architecture &amp; Signoff Flow</text>

  <!-- Intake Sources Section -->
  <rect x="30" y="90" width="350" height="180" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="90" width="350" height="40" rx="10" fill="#805ad5"/>
  <text x="205" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">INTAKE SOURCES</text>

  <!-- GHL Form -->
  <rect x="50" y="145" width="100" height="50" rx="8" fill="url(#ghlGrad)"/>
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">GHL Form</text>

  <!-- Email -->
  <rect x="160" y="145" width="100" height="50" rx="8" fill="#667eea"/>
  <text x="210" y="168" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Email</text>
  <text x="210" y="182" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">support@shb.studio</text>

  <!-- Manual -->
  <rect x="270" y="145" width="100" height="50" rx="8" fill="#718096"/>
  <text x="320" y="175" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Manual/Phone</text>

  <!-- Webhook Arrow -->
  <text x="205" y="225" font-family="Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Webhook POST</text>
  <line x1="205" y1="235" x2="205" y2="290" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Backend API Section -->
  <rect x="30" y="300" width="350" height="280" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="300" width="350" height="40" rx="10" fill="#2b6cb0"/>
  <text x="205" y="328" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">BACKEND API</text>

  <text x="50" y="360" font-family="monospace" font-size="10" fill="#2d3748">POST /api/warranty/claims</text>
  <text x="50" y="380" font-family="monospace" font-size="10" fill="#2d3748">GET  /api/warranty/claims/:id</text>
  <text x="50" y="400" font-family="monospace" font-size="10" fill="#2d3748">POST /claims/:id/signoff/pm</text>
  <text x="50" y="420" font-family="monospace" font-size="10" fill="#2d3748">POST /claims/:id/signoff/gc</text>
  <text x="50" y="440" font-family="monospace" font-size="10" fill="#2d3748">POST /claims/:id/photos</text>
  <text x="50" y="460" font-family="monospace" font-size="10" fill="#2d3748">POST /claims/:id/signoff/repair</text>
  <text x="50" y="480" font-family="monospace" font-size="10" fill="#2d3748">POST /claims/:id/signoff/homeowner</text>
  <text x="50" y="500" font-family="monospace" font-size="10" fill="#2d3748">POST /claims/:id/signoff/close</text>
  <text x="50" y="530" font-family="monospace" font-size="10" fill="#718096">GET  /public/status (no auth)</text>
  <text x="50" y="550" font-family="monospace" font-size="10" fill="#718096">POST /webhook/ghl</text>

  <!-- Database Section -->
  <rect x="30" y="600" width="350" height="120" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="600" width="350" height="40" rx="10" fill="url(#dbGrad)"/>
  <text x="205" y="628" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">DATABASE</text>

  <rect x="50" y="655" width="140" height="45" rx="5" fill="#fbd38d"/>
  <text x="120" y="682" font-family="monospace" font-size="10" fill="#744210" text-anchor="middle">warranty_claims</text>

  <rect x="210" y="655" width="150" height="45" rx="5" fill="#fbd38d"/>
  <text x="285" y="682" font-family="monospace" font-size="10" fill="#744210" text-anchor="middle">warranty_claim_activities</text>

  <!-- 6-Gate Signoff Flow -->
  <rect x="420" y="90" width="750" height="630" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="420" y="90" width="750" height="40" rx="10" fill="#c53030"/>
  <text x="795" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">6-GATE SIGNOFF PROTOCOL</text>

  <!-- Gate 1 -->
  <rect x="450" y="150" width="200" height="80" rx="8" fill="url(#gateGrad)"/>
  <text x="550" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">GATE 1</text>
  <text x="550" y="195" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">PM Intake Signoff</text>
  <text x="550" y="215" font-family="Arial, sans-serif" font-size="10" fill="#bee3f8" text-anchor="middle">Who: Property Manager</text>

  <!-- Gate 2 -->
  <rect x="680" y="150" width="200" height="80" rx="8" fill="url(#gateGrad)"/>
  <text x="780" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">GATE 2</text>
  <text x="780" y="195" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">GC Assignment</text>
  <text x="780" y="215" font-family="Arial, sans-serif" font-size="10" fill="#bee3f8" text-anchor="middle">Who: General Contractor</text>

  <!-- Gate 3 -->
  <rect x="910" y="150" width="200" height="80" rx="8" fill="url(#gateGrad)"/>
  <text x="1010" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">GATE 3</text>
  <text x="1010" y="195" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Photo Documentation</text>
  <text x="1010" y="215" font-family="Arial, sans-serif" font-size="10" fill="#bee3f8" text-anchor="middle">Before &amp; After Required</text>

  <!-- Arrows between gates row 1 -->
  <line x1="650" y1="190" x2="680" y2="190" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="880" y1="190" x2="910" y2="190" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow down to row 2 -->
  <path d="M 1010 230 L 1010 270 L 550 270 L 550 290" stroke="#2d3748" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Gate 4 -->
  <rect x="450" y="300" width="200" height="80" rx="8" fill="url(#gateGrad)"/>
  <text x="550" y="325" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">GATE 4</text>
  <text x="550" y="345" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Repair Signoff</text>
  <text x="550" y="365" font-family="Arial, sans-serif" font-size="10" fill="#bee3f8" text-anchor="middle">Who: PM Verification</text>

  <!-- Gate 5 -->
  <rect x="680" y="300" width="200" height="80" rx="8" fill="#48bb78"/>
  <text x="780" y="325" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">GATE 5</text>
  <text x="780" y="345" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Homeowner Signoff</text>
  <text x="780" y="365" font-family="Arial, sans-serif" font-size="10" fill="#c6f6d5" text-anchor="middle">24hr Auto-Approval</text>

  <!-- Gate 6 -->
  <rect x="910" y="300" width="200" height="80" rx="8" fill="#805ad5"/>
  <text x="1010" y="325" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">GATE 6</text>
  <text x="1010" y="345" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Closure Signoff</text>
  <text x="1010" y="365" font-family="Arial, sans-serif" font-size="10" fill="#e9d8fd" text-anchor="middle">Who: Owner's Rep</text>

  <!-- Arrows between gates row 2 -->
  <line x1="650" y1="340" x2="680" y2="340" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="880" y1="340" x2="910" y2="340" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Homeowner rejection loop -->
  <path d="M 780 380 L 780 420 L 450 420 L 450 380" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="615" y="435" font-family="Arial, sans-serif" font-size="10" fill="#e53e3e" text-anchor="middle">Rejected → Reopens Claim</text>

  <!-- Completed -->
  <rect x="680" y="480" width="200" height="60" rx="8" fill="#38a169"/>
  <text x="780" y="515" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">CLAIM CLOSED</text>

  <line x1="1010" y1="380" x2="1010" y2="430" stroke="#2d3748" stroke-width="2"/>
  <line x1="1010" y1="430" x2="880" y2="430" stroke="#2d3748" stroke-width="2"/>
  <line x1="880" y1="430" x2="880" y2="480" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Status Labels -->
  <rect x="450" y="560" width="100" height="30" rx="5" fill="#fef3c7"/>
  <text x="500" y="580" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">open</text>

  <rect x="560" y="560" width="100" height="30" rx="5" fill="#dbeafe"/>
  <text x="610" y="580" font-family="Arial, sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">assigned</text>

  <rect x="670" y="560" width="100" height="30" rx="5" fill="#fce7f3"/>
  <text x="720" y="580" font-family="Arial, sans-serif" font-size="10" fill="#9d174d" text-anchor="middle">in-repair</text>

  <rect x="780" y="560" width="100" height="30" rx="5" fill="#d1fae5"/>
  <text x="830" y="580" font-family="Arial, sans-serif" font-size="10" fill="#065f46" text-anchor="middle">resolved</text>

  <rect x="890" y="560" width="100" height="30" rx="5" fill="#c6f6d5"/>
  <text x="940" y="580" font-family="Arial, sans-serif" font-size="10" fill="#22543d" text-anchor="middle">closed</text>

  <text x="450" y="620" font-family="Arial, sans-serif" font-size="11" fill="#4a5568">Status Progression:</text>
  <line x1="500" y1="575" x2="560" y2="575" stroke="#718096" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="660" y1="575" x2="670" y2="575" stroke="#718096" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="770" y1="575" x2="780" y2="575" stroke="#718096" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="880" y1="575" x2="890" y2="575" stroke="#718096" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- Data Flow to External Systems -->
  <rect x="450" y="650" width="700" height="60" rx="8" fill="#edf2f7"/>
  <text x="800" y="685" font-family="Arial, sans-serif" font-size="12" fill="#2d3748" text-anchor="middle">External Integrations: Google Sheets (SOR) | Slack (#warranty) | GHL Communications</text>

  <!-- Legend -->
  <rect x="30" y="750" width="350" height="130" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <text x="50" y="775" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3748">Legend</text>

  <rect x="50" y="790" width="20" height="15" fill="url(#gateGrad)"/>
  <text x="80" y="802" font-family="Arial, sans-serif" font-size="11" fill="#4a5568">Internal Signoff Gate</text>

  <rect x="50" y="815" width="20" height="15" fill="#48bb78"/>
  <text x="80" y="827" font-family="Arial, sans-serif" font-size="11" fill="#4a5568">Homeowner Gate (24hr auto)</text>

  <rect x="200" y="790" width="20" height="15" fill="#805ad5"/>
  <text x="230" y="802" font-family="Arial, sans-serif" font-size="11" fill="#4a5568">Final Approval Gate</text>

  <line x1="200" y1="822" x2="220" y2="822" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="230" y="827" font-family="Arial, sans-serif" font-size="11" fill="#4a5568">Rejection Loop</text>

  <text x="50" y="860" font-family="Arial, sans-serif" font-size="10" fill="#718096">Version 1.0 | Ready for Deployment | 2026-05-29</text>

</svg>
