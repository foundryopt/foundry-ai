version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: foundry-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: foundry
      POSTGRES_PASSWORD: foundry
      POSTGRES_DB: foundry_dev
    volumes:
      - foundry_pgdata:/var/lib/postgresql/data

volumes:
  foundry_pgdata:
