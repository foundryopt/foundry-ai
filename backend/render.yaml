services:
  - type: web
    name: foundry-warranty-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: foundry-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://www.shb.studio
      - key: NODE_ENV
        value: production

databases:
  - name: foundry-db
    plan: starter
    databaseName: foundry_warranty
